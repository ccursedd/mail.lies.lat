<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #000;
  color: #fff;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  -webkit-font-smoothing: antialiased;
  font-size: 12px;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }
a { color: rgba(255,255,255,0.4); text-decoration: none; }
a:hover { color: rgba(255,255,255,0.8); }

.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── AUTH ── */
.auth-screen {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 300px;
}
.auth-title {
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: 0.2;
  margin-bottom: 8px;
}
.username-wrap {
  display: flex;
  align-items: baseline;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  transition: border-color 0.25s;
  width: 100%;
  position: relative;
}
.username-wrap:focus-within { border-color: rgba(255,255,255,0.3); }
.username-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: right;
  letter-spacing: 2px;
  min-width: 0;
}
.username-wrap input::placeholder { color: rgba(255,255,255,0.12); }
.username-suffix {
  font-size: 13px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.22);
  white-space: nowrap;
  padding: 8px 0 8px 1px;
  flex-shrink: 0;
}
.auth-field { width: 100%; position: relative; }
.auth-field input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: center;
  letter-spacing: 2px;
  transition: border-color 0.25s;
}
.auth-field input:focus { border-color: rgba(255,255,255,0.3); }
.auth-field input::placeholder { color: rgba(255,255,255,0.12); }
.auth-links { font-size: 10px; letter-spacing: 2px; opacity: 0.2; }
.auth-links a { color: #fff; }
.auth-links a:hover { opacity: 0.8; }

/* ── LANDING ── */
.landing-screen {
  height: 100vh;

  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  position: relative;
  overflow: hidden;
}
.landing-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 60%, rgba(255,255,255,0.03) 0%, transparent 70%);
  pointer-events: none;
}
.landing-logo {
  font-size: 11px;
  letter-spacing: 10px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
  margin-bottom: 48px;
}
.landing-tagline {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.08);
  margin-bottom: 60px;
}
.landing-btns { display: flex; gap: 16px; }
.landing-features {
  position: absolute;
  bottom: 40px;
  display: flex;
  gap: 40px;
}
.landing-feature {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.08);
  text-align: center;
}
.landing-feature span {
  display: block;

.btn {

/* ── COMPOSE MODAL ── */

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stripHtml(h) { var d = document.createElement('div'); d.innerHTML = h; return d.textContent || ''; }
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }
function formatDate(ts) {
  if (!ts) return '';
  var d = new Date(ts), now = new Date();

  document.getElementById('login-screen').style.display    = name === 'login'    ? 'flex' : 'none';
  document.getElementById('register-screen').style.display = name === 'register' ? 'flex' : 'none';
  document.getElementById('app').style.display             = name === 'app'      ? 'flex' : 'none';
  if (name === 'login')    setTimeout(function(){ document.getElementById('login-username').focus(); }, 50);
  if (name === 'register') setTimeout(function(){ document.getElementById('reg-username').focus(); }, 50);
}

// ── SESSION STORAGE ──
function saveSession(session, user, email) {
  try { localStorage.setItem('ml_session', JSON.stringify({ session, user, email })); } catch(e) {}
}
function clearSession() {
  try { localStorage.removeItem('ml_session'); } catch(e) {}
}

// ── SUPABASE FETCH (uses service role to bypass RLS) ──
async function sb(path, opts) {
  opts = opts || {};
  var headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + SERVICE_ROLE_KEY,
  };
  Object.assign(headers, opts.headers || {});
  var r = await fetch(SUPABASE_URL + path, Object.assign({}, opts, { headers }));
  var text = await r.text();
  if (!r.ok) throw new Error(text || r.statusText);
  try { return JSON.parse(text); } catch(e) { return {}; }
}

// ── AUTH FETCH ──
async function sbAuth(path, body) {
  var r = await fetch(SUPABASE_URL + '/auth/v1' + path, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  var text = await r.text();
  try { return JSON.parse(text); } catch(e) { return {}; }
}

// ── LOGIN ──
async function doLogin() {
  var username = document.getElementById('login-username').value.trim().toLowerCase();
  var password = document.getElementById('login-password').value;
  var email    = username + '@' + DOMAIN;
  var errEl    = document.getElementById('login-err');
  var btn      = document.getElementById('login-btn');
  errEl.textContent = '';
  if (!username) { errEl.textContent = 'enter username'; return; }
  if (!password) { errEl.textContent = 'enter password'; return; }
  btn.disabled = true; btn.textContent = '...';
  try {
    var data = await sbAuth('/token?grant_type=password', { email, password });
    if (data.error || data.error_description) throw new Error(data.error_description || data.error || 'login failed');
    currentSession = data;
    currentUser    = data.user;
    myEmail        = email;
    saveSession(data, data.user, email);
    bootApp();
  } catch(e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'enter';
  }
}

// ── REGISTER ──
async function doRegister() {
  var username  = document.getElementById('reg-username').value.trim().toLowerCase();
  var password  = document.getElementById('reg-password').value;
  var password2 = document.getElementById('reg-password2').value;
  var email     = username + '@' + DOMAIN;
  var errEl     = document.getElementById('reg-err');
  var btn       = document.getElementById('reg-btn');
  errEl.textContent = '';
  if (!username || username.length < 2) { errEl.textContent = 'username too short'; return; }
  if (!/^[a-z0-9._-]+$/.test(username)) { errEl.textContent = 'letters, numbers, dots only'; return; }
  if (password.length < 6) { errEl.textContent = 'password min 6 chars'; return; }
  if (password !== password2) { errEl.textContent = 'passwords do not match'; return; }
  btn.disabled = true; btn.textContent = '...';
  try {
    var data = await sbAuth('/signup', { email, password, data: { username } });
    if (data.error || data.error_description) throw new Error(data.error_description || data.error || 'registration failed');
    if (data.access_token) {
      currentSession = data;
      currentUser    = data.user;
      myEmail        = email;
      saveSession(data, data.user, email);
      bootApp();
    } else {
      errEl.className = 'ok';
      errEl.textContent = 'account created! sign in now.';
      setTimeout(function(){ showScreen('login'); errEl.className = 'err'; errEl.textContent = ''; }, 1800);
    }
  } catch(e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'register';
  }
}

// ── BOOT APP ──
function bootApp() {
  document.getElementById('topbar-addr').textContent = myEmail;
  document.getElementById('compose-from-addr').textContent = myEmail;
  showScreen('app');
  setFolder('inbox', document.getElementById('nav-inbox'));
  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadEmails, 15000);
}

// ── LOGOUT ──
function doLogout() {
  currentSession = null; currentUser = null; myEmail = ''; currentEmail = null;
  emails = []; currentFolder = 'inbox';
  clearInterval(refreshTimer);
  clearSession();
  showScreen('landing');
}

// ── RESTORE SESSION ──
async function restoreSession() {
  try {
    var raw = localStorage.getItem('ml_session');
    if (!raw) { showScreen('landing'); return; }
    var saved = JSON.parse(raw);
    if (!saved.session || !saved.session.access_token) { showScreen('landing'); return; }
    // Verify token still valid
    var r = await fetch(SUPABASE_URL + '/auth/v1/user', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + saved.session.access_token }
    });
    if (!r.ok) { clearSession(); showScreen('landing'); return; }
    var userData = await r.json();
    currentSession = saved.session;
    currentUser    = userData;
    myEmail        = saved.email;
    bootApp();
  } catch(e) {
    clearSession();
    showScreen('landing');
  }
}

// ── LOAD EMAILS ──
async function loadEmails() {
  if (!currentUser) return;
  try {
    var q = '/rest/v1/emails?select=*&order=received_at.desc.nullslast,created_at.desc';
    q += '&user_id=eq.' + currentUser.id;
    if (currentFolder === 'inbox')   q += '&folder=eq.inbox&is_deleted=eq.false';
    else if (currentFolder === 'sent')    q += '&folder=eq.sent&is_deleted=eq.false';
    else if (currentFolder === 'trash')   q += '&is_deleted=eq.true';
    else if (currentFolder === 'unread')  q += '&is_read=eq.false&is_deleted=eq.false';
    else if (currentFolder === 'starred') q += '&is_starred=eq.true&is_deleted=eq.false';
    var data = await sb(q, { headers: { 'Prefer': 'return=representation' } });
    emails = Array.isArray(data) ? data : [];
    renderEmailList(emails);
    updateUnreadCount();
  } catch(e) {
    console.error('loadEmails error:', e);
    emails = [];
    renderEmailList([]);
  }
}

function renderEmailList(list) {
  var el = document.getElementById('email-list');
  var search = document.getElementById('search-input').value.toLowerCase();
  if (search) list = list.filter(function(e) {
    return (e.subject||'').toLowerCase().includes(search) ||
           (e.from_address||'').toLowerCase().includes(search) ||
           (e.from_name||'').toLowerCase().includes(search);
  });
  if (!list.length) { el.innerHTML = '<div class="empty-state">no mail</div>'; return; }
  el.innerHTML = list.map(function(e) {
    var from    = e.from_name || e.from_address || 'unknown';
    var subject = e.subject || '(no subject)';
    var preview = stripHtml(e.body_text || e.body_html || '');
    var date    = formatDate(e.received_at || e.created_at);
    var unread  = !e.is_read;
    var active  = currentEmail && currentEmail.id === e.id;
    return '<div class="email-item' + (unread?' unread':'') + (active?' active':'') + '" onclick="openEmail(\'' + e.id + '\')">'
      + '<div class="email-meta"><div class="email-from">' + esc(truncate(from, 26)) + '</div><div class="email-time">' + esc(date) + '</div></div>'
      + '<div class="email-subject">' + esc(truncate(subject, 38)) + '</div>'
      + '<div class="email-preview">' + esc(truncate(preview, 55)) + '</div>'
      + '</div>';
  }).join('');
}

function filterEmails() { renderEmailList(emails); }

function updateUnreadCount() {
  var n = emails.filter(function(e){ return !e.is_read && !e.is_deleted; }).length;
  document.getElementById('unread-count').textContent = n > 0 ? n : '';
}

// ── OPEN EMAIL ──
async function openEmail(id) {
  currentEmail = emails.find(function(e){ return e.id === id; });
  if (!currentEmail) return;
  document.getElementById('detail-empty').style.display = 'none';
  var dv = document.getElementById('detail-view');
  dv.style.display = 'flex';
  document.getElementById('detail-subject').textContent = currentEmail.subject || '(no subject)';
  document.getElementById('detail-from').textContent    = 'from: ' + (currentEmail.from_name ? currentEmail.from_name + ' <' + currentEmail.from_address + '>' : currentEmail.from_address || '');
  document.getElementById('detail-date').textContent    = formatDateTime(currentEmail.received_at || currentEmail.created_at);
  // Prefer HTML body, fall back to text
  var body = document.getElementById('detail-body');
  if (currentEmail.body_html) {
    body.innerHTML = '<iframe srcdoc="' + esc(currentEmail.body_html) + '" style="width:100%;height:100%;border:none;background:#fff;" sandbox="allow-same-origin"></iframe>';
  } else {
    body.innerHTML = '<div style="white-space:pre-wrap;color:rgba(255,255,255,0.6);">' + esc(currentEmail.body_text || '(no content)') + '</div>';
  }
  // Highlight active
  document.querySelectorAll('.email-item').forEach(function(el){ el.classList.remove('active'); });
  var item = document.querySelector('[onclick="openEmail(\'' + id + '\')"]');
  if (item) item.classList.add('active');
  // Mark read
  if (!currentEmail.is_read) {
    currentEmail.is_read = true;
    try {
      await sb('/rest/v1/emails?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ is_read: true }), headers: { 'Prefer': 'return=minimal' } });
      updateUnreadCount();
    } catch(e) {}
  }
}

// ── FOLDER ──
function setFolder(folder, el) {
  currentFolder = folder;
  currentEmail  = null;
  document.getElementById('detail-empty').style.display = 'block';
  document.getElementById('detail-view').style.display  = 'none';
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  if (el) el.classList.add('active');
  document.getElementById('pane-title').textContent = folder;
  loadEmails();
}

// ── MARK ALL READ ──
async function markAllRead() {
  if (!currentUser) return;
  try {
    await sb('/rest/v1/emails?user_id=eq.' + currentUser.id + '&is_read=eq.false', {
      method: 'PATCH', body: JSON.stringify({ is_read: true }), headers: { 'Prefer': 'return=minimal' }
    });
    await loadEmails();
    toast('all marked read');
  } catch(e) { toast('failed', true); }
}

// ── STAR / DELETE ──
async function toggleStar() {
  if (!currentEmail) return;
  var val = !currentEmail.is_starred;
  try {
    await sb('/rest/v1/emails?id=eq.' + currentEmail.id, { method: 'PATCH', body: JSON.stringify({ is_starred: val }), headers: { 'Prefer': 'return=minimal' } });
    currentEmail.is_starred = val;
    toast(val ? 'starred' : 'unstarred');
  } catch(e) { toast('failed', true); }
}
async function deleteEmail() {
  if (!currentEmail) return;
  try {
    await sb('/rest/v1/emails?id=eq.' + currentEmail.id, { method: 'PATCH', body: JSON.stringify({ is_deleted: true }), headers: { 'Prefer': 'return=minimal' } });
    currentEmail = null;
    document.getElementById('detail-empty').style.display = 'block';
    document.getElementById('detail-view').style.display  = 'none';
    toast('deleted');
    await loadEmails();
  } catch(e) { toast('failed', true); }
}

// ── COMPOSE ──
function openCompose() {
  document.getElementById('compose-to').value      = '';
  document.getElementById('compose-subject').value  = '';
  document.getElementById('compose-body').value     = '';
  document.getElementById('compose-status').textContent = '';
  document.getElementById('compose-modal').style.display = 'flex';
  setTimeout(function(){ document.getElementById('compose-to').focus(); }, 50);
}
function closeCompose() { document.getElementById('compose-modal').style.display = 'none'; }

// ── SEND VIA EDGE FUNCTION ──
async function sendViaEdge(from, to, subject, text) {
  var r = await fetch(SUPABASE_URL + '/functions/v1/mailgun-send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ from, to, subject: subject || '(no subject)', text })
  });
  var data = await r.json();
  if (!r.ok) throw new Error(data.error || data.result || 'send failed');
  return data;
}

async function saveSent(to, subject, body) {
  await sb('/rest/v1/emails', {
    method: 'POST',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({
      user_id: currentUser.id,
      from_address: myEmail, from_name: currentUser.user_metadata ? currentUser.user_metadata.username : '',
      to_address: to, subject: subject || '(no subject)', body_text: body,
      folder: 'sent', is_read: true, is_deleted: false, is_starred: false,
      received_at: new Date().toISOString()
    })
  });
}

async function sendCompose() {
  var to      = document.getElementById('compose-to').value.trim();
  var subject = document.getElementById('compose-subject').value.trim();
  var body    = document.getElementById('compose-body').value.trim();
  var status  = document.getElementById('compose-status');
  if (!to)   { status.textContent = 'enter recipient'; return; }
  if (!body) { status.textContent = 'enter message'; return; }
  status.textContent = 'sending...';
  try {
    await sendViaEdge(myEmail, to, subject, body);
    await saveSent(to, subject, body);
    status.textContent = 'sent!';
    toast('message sent');
    setTimeout(closeCompose, 1200);
    if (currentFolder === 'sent') loadEmails();
  } catch(e) {
    status.textContent = 'failed';
    toast('send failed: ' + e.message, true);
  }
}

async function sendReply() {
  if (!currentEmail) return;
  var body    = document.getElementById('reply-text').value.trim();
  var to      = currentEmail.from_address || '';
  var subject = 'Re: ' + (currentEmail.subject || '');
  if (!body) return;
  try {
    await sendViaEdge(myEmail, to, subject, body);
    await saveSent(to, subject, body);
    document.getElementById('reply-text').value = '';
    toast('reply sent');
  } catch(e) { toast('reply failed: ' + e.message, true); }
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeCompose();
});
document.getElementById('login-username').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('login-password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('reg-username').addEventListener('keydown',   function(e){ if(e.key==='Enter') doRegister(); });
document.getElementById('reg-password').addEventListener('keydown',   function(e){ if(e.key==='Enter') doRegister(); });
document.getElementById('reg-password2').addEventListener('keydown',  function(e){ if(e.key==='Enter') doRegister(); });

restoreSession();
</script>
