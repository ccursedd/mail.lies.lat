<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mail.lies.lat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #000;
  color: #fff;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
.auth-screen, .landing-screen {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.auth-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 300px;
}
.auth-title, .landing-logo {
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: 0.2;
  margin-bottom: 8px;
}
.username-wrap {
  display: flex;
  align-items: baseline;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  width: 100%;
}
.username-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: right;
}
.username-suffix {
  font-size: 13px;
  color: rgba(255,255,255,0.22);
  padding: 8px 0 8px 1px;
}
.auth-field input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: center;
}
.landing-btns { display: flex; gap: 16px; margin-top: 20px; }
.btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.4);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 10px 28px;
  cursor: pointer;
  border-radius: 2px;
}
.btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
.btn-sm { padding: 6px 14px; font-size: 9px; letter-spacing: 2px; }
.btn-primary { border-color: rgba(88,101,242,0.3); color: rgba(88,101,242,0.7); }
.btn-primary:hover { border-color: rgba(88,101,242,0.5); color: rgba(88,101,242,1); }
.btn-icon {
  background: transparent; border: none;
  color: rgba(255,255,255,0.3); cursor: pointer;
  padding: 4px 8px;
}
#app { display: none; height: 100vh; flex-direction: column; }
.topbar {
  height: 44px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}
.topbar-addr { font-size: 10px; color: rgba(255,255,255,0.35); }
.topbar-right { margin-left: auto; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 200px;
  border-right: 1px solid rgba(255,255,255,0.05);
  padding: 16px 0;
}
.compose-btn {
  margin: 0 12px 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 10px;
  cursor: pointer;
  text-align: center;
  width: calc(100% - 24px);
}
.nav-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 10px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  display: flex;
  justify-content: space-between;
}
.nav-item.active { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }
.email-list-pane {
  width: 350px;
  border-right: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
}
.pane-header {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}
.search-bar { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.search-bar input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  color: #fff;
  font-family: inherit;
  font-size: 11px;
  padding: 6px 10px;
  outline: none;
}
.email-list { overflow-y: auto; flex: 1; }
.email-item {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
}
.email-item:hover { background: rgba(255,255,255,0.025); }
.email-from { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 3px; }
.email-subject { font-size: 11px; color: rgba(255,255,255,0.35); }
.email-time { font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 4px; }
.detail-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.detail-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.detail-subject { font-size: 15px; margin-bottom: 10px; }
.detail-body { flex: 1; overflow-y: auto; padding: 24px; white-space: pre-wrap; }
.reply-area { border-top: 1px solid rgba(255,255,255,0.05); padding: 16px 24px; }
.reply-area textarea {
  width: 100%;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.7);
  font-family: inherit;
  font-size: 12px;
  padding: 10px;
  min-height: 80px;
  outline: none;
}
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: #0a0a0a; border: 1px solid rgba(255,255,255,0.08);
  width: 500px; max-width: 95vw;
}
.modal-header { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
.modal-field { padding: 10px 20px; display: flex; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.modal-field label { width: 40px; opacity: 0.3; }
.modal-field input, .modal-body textarea {
  flex: 1; background: transparent; border: none; color: #fff; outline: none;
}
.modal-body textarea { min-height: 150px; width: 100%; padding: 16px 20px; }
.modal-footer { padding: 12px 20px; display: flex; gap: 8px; }
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #111; border: 1px solid rgba(255,255,255,0.08);
  padding: 12px 20px; font-size: 10px;
  opacity: 0; transition: opacity 0.3s; z-index: 200;
}
.toast.show { opacity: 1; }
.err { font-size: 10px; color: rgba(255,80,80,0.7); text-align: center; }
.loader {
  display: inline-block; width: 12px; height: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  border-top-color: rgba(255,255,255,0.4);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px; opacity: 0.3; }
</style>
</head>
<body>

<div id="landing-screen" class="landing-screen">
  <div class="landing-logo">mail.lies.lat</div>
  <div class="landing-btns">
    <button class="btn" onclick="showAuth('login')">sign in</button>
    <button class="btn" onclick="showAuth('register')">create account</button>
  </div>
</div>

<div id="login-screen" class="auth-screen" style="display:none;">
  <div class="auth-box">
    <div class="auth-title">sign in</div>
    <div class="username-wrap">
      <input type="text" id="login-username" placeholder="username" autofocus>
      <span class="username-suffix">@lies.lat</span>
    </div>
    <div class="auth-field">
      <input type="password" id="login-password" placeholder="password">
    </div>
    <div class="err" id="login-err"></div>
    <button class="btn" onclick="doLogin()">enter</button>
    <div class="auth-links"><a href="#" onclick="showAuth('register')">create account</a> | <a href="#" onclick="showAuth('landing')">back</a></div>
  </div>
</div>

<div id="register-screen" class="auth-screen" style="display:none;">
  <div class="auth-box">
    <div class="auth-title">create account</div>
    <div class="username-wrap">
      <input type="text" id="reg-username" placeholder="username">
      <span class="username-suffix">@lies.lat</span>
    </div>
    <div class="auth-field">
      <input type="password" id="reg-password" placeholder="password">
    </div>
    <div class="auth-field">
      <input type="password" id="reg-password2" placeholder="confirm password">
    </div>
    <div class="err" id="reg-err"></div>
    <button class="btn" onclick="doRegister()">register</button>
    <div class="auth-links"><a href="#" onclick="showAuth('login')">sign in</a> | <a href="#" onclick="showAuth('landing')">back</a></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="opacity:0.2;">mail.lies.lat</div>
    <div id="topbar-addr" class="topbar-addr"></div>
    <div class="topbar-right">
      <button class="btn-icon" onclick="doLogout()">sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <button class="compose-btn" onclick="openCompose()">+ compose</button>
      <div class="nav-item active" onclick="setFolder('inbox')">inbox <span id="unread-count"></span></div>
      <div class="nav-item" onclick="setFolder('sent')">sent</div>
    </div>
    <div class="email-list-pane">
      <div class="pane-header">
        <span id="pane-title">inbox</span>
        <button class="btn-icon" onclick="refreshEmails()">↻</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="search..." oninput="filterEmails()">
      </div>
      <div class="email-list" id="email-list">
        <div class="empty-state">loading...</div>
      </div>
    </div>
    <div class="detail-pane">
      <div id="detail-empty" style="text-align:center; margin-top:40px; opacity:0.2;">select an email</div>
      <div id="detail-view" style="display:none; flex-direction:column; height:100%;">
        <div class="detail-header">
          <div class="detail-subject" id="detail-subject"></div>
          <div><span id="detail-from"></span> → <span id="detail-to"></span></div>
          <div style="font-size:9px; opacity:0.3;" id="detail-date"></div>
        </div>
        <div class="detail-body" id="detail-body"></div>
        <div class="reply-area">
          <textarea id="reply-text" placeholder="reply..."></textarea>
          <div style="margin-top:8px;">
            <button class="btn btn-sm btn-primary" onclick="sendReply()">send reply</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="compose-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header"><span>new message</span><button class="btn-icon" onclick="closeCompose()">✕</button></div>
    <div class="modal-field"><label>to</label><input id="compose-to" placeholder="recipient@example.com"></div>
    <div class="modal-field"><label>subj</label><input id="compose-subject" placeholder="subject"></div>
    <div class="modal-body"><textarea id="compose-body" placeholder="write your message..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-sm btn-primary" onclick="sendCompose()">send</button>
      <button class="btn btn-sm" onclick="closeCompose()">cancel</button>
      <span id="compose-status" style="margin-left:auto; font-size:9px;"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://kpuegnejvlgypfvjhdwo.supabase.co';
const SUPABASE_KEY = 'sb_publishable__XS7GvAwectb2eVNhOtnVA_5DUs0B9L';
const SERVICE_ROLE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwdWVnbmVqdmxneXBmdmpoZHdvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzMxNTIxNiwiZXhwIjoyMDkyODkxMjE2fQ.wlS-mLskYLflHAaRB-idPlY5_Sm2Cn0EFOU5-k8UTbs';

let currentUser = null;
let currentSession = null;
let emails = [];
let currentFolder = 'inbox';
let refreshTimer = null;
let myEmail = '';

function showToast(msg, isErr) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.className = 'toast', 2500);
}

function showAuth(screen) {
  document.getElementById('landing-screen').style.display = screen === 'landing' ? 'flex' : 'none';
  document.getElementById('login-screen').style.display = screen === 'login' ? 'flex' : 'none';
  document.getElementById('register-screen').style.display = screen === 'register' ? 'flex' : 'none';
  if (screen === 'login') document.getElementById('login-username').focus();
  if (screen === 'register') document.getElementById('reg-username').focus();
}

async function sbFetch(path, options = {}, useServiceRole = false) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...(options.headers || {})
  };
  if (useServiceRole) {
    headers['Authorization'] = `Bearer ${SERVICE_ROLE_KEY}`;
  } else if (currentSession?.access_token) {
    headers['Authorization'] = `Bearer ${currentSession.access_token}`;
  }
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...options, headers });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json();
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const email = `${username}@lies.lat`;
  
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!username) { errEl.textContent = 'enter username'; return; }
  if (!password) { errEl.textContent = 'enter password'; return; }
  
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error_description || 'Invalid login');
    
    currentSession = data;
    currentUser = data.user;
    myEmail = email;
    localStorage.setItem('session', JSON.stringify({ session: data, email }));
    
    document.getElementById('app').style.display = 'flex';
    document.getElementById('landing-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('topbar-addr').textContent = myEmail;
    
    await loadEmails();
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(loadEmails, 15000);
  } catch(err) {
    errEl.textContent = err.message;
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim().toLowerCase();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  const email = `${username}@lies.lat`;
  
  const errEl = document.getElementById('reg-err');
  errEl.textContent = '';
  
  if (!username || username.length < 2) { errEl.textContent = 'username too short'; return; }
  if (password.length < 6) { errEl.textContent = 'password min 6 chars'; return; }
  if (password !== password2) { errEl.textContent = 'passwords do not match'; return; }
  
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, data: { username } })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error_description || 'Registration failed');
    
    if (data.access_token) {
      currentSession = data;
      currentUser = data.user;
      myEmail = email;
      localStorage.setItem('session', JSON.stringify({ session: data, email }));
      document.getElementById('app').style.display = 'flex';
      document.getElementById('landing-screen').style.display = 'none';
      document.getElementById('register-screen').style.display = 'none';
      document.getElementById('topbar-addr').textContent = myEmail;
      await loadEmails();
      refreshTimer = setInterval(loadEmails, 15000);
    } else {
      errEl.textContent = 'Account created! Please sign in.';
      setTimeout(() => showAuth('login'), 2000);
    }
  } catch(err) {
    errEl.textContent = err.message;
  }
}

async function loadEmails() {
  if (!currentUser && !currentSession) return;
  
  try {
    // Use service role to bypass RLS and get ALL emails for this user
    let query = `/rest/v1/emails?select=*&order=received_at.desc.nullslast`;
    
    // Filter by user_id
    if (currentUser?.id) {
      query += `&user_id=eq.${currentUser.id}`;
    }
    
    // Folder filters
    if (currentFolder === 'sent') query += '&folder=eq.sent';
    else if (currentFolder === 'inbox') query += '&is_deleted=eq.false';
    
    console.log('Query:', query);
    
    const data = await sbFetch(query, {}, true); // Use service role!
    emails = Array.isArray(data) ? data : [];
    console.log(`Loaded ${emails.length} emails`);
    
    renderEmailList();
    updateUnreadCount();
  } catch(err) {
    console.error('Load error:', err);
    document.getElementById('email-list').innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
  }
}

function renderEmailList() {
  const container = document.getElementById('email-list');
  const search = document.getElementById('search-input')?.value.toLowerCase() || '';
  
  let filtered = emails;
  if (search) {
    filtered = emails.filter(e => 
      (e.subject || '').toLowerCase().includes(search) ||
      (e.from_address || '').toLowerCase().includes(search)
    );
  }
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">no messages</div>';
    return;
  }
  
  container.innerHTML = filtered.map(email => `
    <div class="email-item" onclick="viewEmail('${email.id}')">
      <div class="email-from">${escapeHtml(email.from_address || email.from_name || 'unknown')}</div>
      <div class="email-subject">${escapeHtml(email.subject || '(no subject)')}</div>
      <div class="email-time">${formatDate(email.received_at)}</div>
    </div>
  `).join('');
}

function filterEmails() {
  renderEmailList();
}

async function viewEmail(id) {
  const email = emails.find(e => e.id === id);
  if (!email) return;
  
  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-view').style.display = 'flex';
  document.getElementById('detail-subject').textContent = email.subject || '(no subject)';
  document.getElementById('detail-from').textContent = email.from_address || email.from_name;
  document.getElementById('detail-to').textContent = email.to_address;
  document.getElementById('detail-date').textContent = formatDateTime(email.received_at);
  document.getElementById('detail-body').innerHTML = `<div style="white-space:pre-wrap;">${escapeHtml(email.body_text || email.body_html || '(no content)')}</div>`;
  document.getElementById('reply-text').placeholder = `Reply to ${email.from_address || ''}`;
  
  if (!email.is_read) {
    email.is_read = true;
    try {
      await sbFetch(`/rest/v1/emails?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ is_read: true })
      }, true);
      updateUnreadCount();
    } catch(e) {}
  }
}

function setFolder(folder) {
  currentFolder = folder;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('pane-title').textContent = folder;
  loadEmails();
}

function updateUnreadCount() {
  const count = emails.filter(e => !e.is_read && !e.is_deleted).length;
  document.getElementById('unread-count').textContent = count > 0 ? count : '';
}

function refreshEmails() {
  document.getElementById('email-list').innerHTML = '<div class="empty-state">loading...</div>';
  loadEmails();
}

function doLogout() {
  currentUser = null;
  currentSession = null;
  localStorage.removeItem('session');
  if (refreshTimer) clearInterval(refreshTimer);
  document.getElementById('app').style.display = 'none';
  showAuth('landing');
}

function openCompose() {
  document.getElementById('compose-modal').style.display = 'flex';
  document.getElementById('compose-to').value = '';
  document.getElementById('compose-subject').value = '';
  document.getElementById('compose-body').value = '';
  document.getElementById('compose-status').textContent = '';
}
function closeCompose() {
  document.getElementById('compose-modal').style.display = 'none';
}

async function sendViaEdge(to, subject, text) {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/mailgun-send`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      from: myEmail, 
      to: to, 
      subject: subject || '(no subject)', 
      text: text 
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Send failed');
  return data;
}

async function sendCompose() {
  const to = document.getElementById('compose-to').value.trim();
  const subject = document.getElementById('compose-subject').value.trim();
  const body = document.getElementById('compose-body').value.trim();
  const status = document.getElementById('compose-status');
  
  if (!to) { status.textContent = 'enter recipient'; return; }
  if (!body) { status.textContent = 'enter message'; return; }
  
  status.textContent = 'sending...';
  try {
    await sendViaEdge(to, subject, body);
    
    // Save to sent folder
    await sbFetch('/rest/v1/emails', {
      method: 'POST',
      body: JSON.stringify({
        user_id: currentUser.id,
        from_address: myEmail,
        to_address: to,
        subject: subject,
        body_text: body,
        folder: 'sent',
        is_read: true,
        received_at: new Date().toISOString()
      })
    }, true);
    
    status.textContent = 'sent!';
    showToast('Message sent');
    setTimeout(closeCompose, 1000);
    if (currentFolder === 'sent') loadEmails();
  } catch(err) {
    status.textContent = 'failed';
    showToast('Send failed: ' + err.message, true);
  }
}

async function sendReply() {
  const body = document.getElementById('reply-text').value.trim();
  if (!body) return;
  
  const currentEmail = emails.find(e => e.id === document.getElementById('detail-subject')?.parentElement?.parentElement?.dataset?.id);
  if (!currentEmail) return;
  
  try {
    await sendViaEdge(currentEmail.from_address, `Re: ${currentEmail.subject}`, body);
    
    await sbFetch('/rest/v1/emails', {
      method: 'POST',
      body: JSON.stringify({
        user_id: currentUser.id,
        from_address: myEmail,
        to_address: currentEmail.from_address,
        subject: `Re: ${currentEmail.subject}`,
        body_text: body,
        folder: 'sent',
        is_read: true,
        received_at: new Date().toISOString()
      })
    }, true);
    
    document.getElementById('reply-text').value = '';
    showToast('Reply sent');
  } catch(err) {
    showToast('Reply failed: ' + err.message, true);
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatDateTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString();
}

async function restoreSession() {
  const saved = localStorage.getItem('session');
  if (!saved) { showAuth('landing'); return; }
  
  try {
    const { session, email } = JSON.parse(saved);
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${session.access_token}` }
    });
    if (res.ok) {
      const userData = await res.json();
      currentSession = session;
      currentUser = userData;
      myEmail = email;
      document.getElementById('app').style.display = 'flex';
      document.getElementById('landing-screen').style.display = 'none';
      document.getElementById('topbar-addr').textContent = myEmail;
      await loadEmails();
      refreshTimer = setInterval(loadEmails, 15000);
    } else {
      localStorage.removeItem('session');
      showAuth('landing');
    }
  } catch(e) {
    localStorage.removeItem('session');
    showAuth('landing');
  }
}

restoreSession();
</script>
