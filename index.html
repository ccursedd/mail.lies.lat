<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mail.lies.lat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #000;
  color: #fff;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); }
.btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.4);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 10px 28px;
  cursor: pointer;
  transition: all 0.25s;
  border-radius: 2px;
}
.btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
.auth-screen {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 300px;
}
.username-wrap {
  display: flex;
  align-items: baseline;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  width: 100%;
}
.username-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: right;
}
.username-suffix {
  font-size: 13px;
  color: rgba(255,255,255,0.22);
  padding: 8px 0 8px 1px;
}
.auth-field input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: center;
}
#app { display: none; height: 100vh; flex-direction: column; }
.topbar {
  height: 44px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}
.topbar-addr { font-size: 10px; color: rgba(255,255,255,0.35); }
.topbar-right { margin-left: auto; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 180px;
  border-right: 1px solid rgba(255,255,255,0.05);
  padding: 16px 0;
}
.nav-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 10px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}
.nav-item.active { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }
.email-list-pane {
  width: 350px;
  border-right: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
}
.email-list {
  overflow-y: auto;
  flex: 1;
}
.email-item {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
}
.email-item:hover { background: rgba(255,255,255,0.025); }
.email-from { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 3px; }
.email-subject { font-size: 11px; color: rgba(255,255,255,0.35); }
.detail-pane { flex: 1; padding: 20px; overflow-y: auto; }
.err { font-size: 10px; color: rgba(255,80,80,0.7); text-align: center; }
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 10px 16px;
  font-size: 10px;
  border-radius: 2px;
  display: none;
}
.toast.show { display: block; }
.loader {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  border-top-color: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-screen" class="auth-screen">
  <div class="auth-box">
    <div style="font-size:11px; letter-spacing:6px; opacity:0.2;">mail.lies.lat</div>
    <div class="username-wrap">
      <input type="text" id="login-username" placeholder="username" autofocus>
      <span class="username-suffix">@lies.lat</span>
    </div>
    <div class="auth-field">
      <input type="password" id="login-password" placeholder="password">
    </div>
    <div class="err" id="login-err"></div>
    <button class="btn" id="login-btn">enter</button>
    <button class="btn" id="register-btn" style="border-color:rgba(88,101,242,0.3);">create account</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div style="opacity:0.2;">mail.lies.lat</div>
    <div id="topbar-addr" class="topbar-addr"></div>
    <div class="topbar-right">
      <button class="btn" style="padding:4px 12px;" onclick="doLogout()">sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="nav-item active" onclick="setFolder('inbox')">inbox <span id="unread-count" style="float:right;"></span></div>
      <div class="nav-item" onclick="setFolder('sent')">sent</div>
      <div class="nav-item" onclick="setFolder('trash')">trash</div>
    </div>
    <div class="email-list-pane">
      <div style="padding:12px; border-bottom:1px solid rgba(255,255,255,0.05);">
        <input type="text" id="search-input" placeholder="search..." style="width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); color:#fff; padding:6px;">
      </div>
      <div class="email-list" id="email-list">
        <div style="text-align:center; padding:40px; opacity:0.3;">loading...</div>
      </div>
    </div>
    <div class="detail-pane" id="detail-pane">
      <div style="opacity:0.2; text-align:center; margin-top:40px;">select an email</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">message</div>

<script>
const SUPABASE_URL = 'https://kpuegnejvlgypfvjhdwo.supabase.co';
const SUPABASE_KEY = 'sb_publishable__XS7GvAwectb2eVNhOtnVA_5DUs0B9L';

let currentSession = null;
let currentUser = null;
let emails = [];
let currentFolder = 'inbox';

function showToast(msg, isErr) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.className = 'toast', 2000);
}

async function sbFetch(path, options = {}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...options.headers
  };
  if (currentSession?.access_token) {
    headers['Authorization'] = `Bearer ${currentSession.access_token}`;
  }
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...options, headers });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json();
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const email = `${username}@lies.lat`;
  
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-btn').disabled = true;
  
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error_description || 'Invalid credentials');
    
    currentSession = data;
    currentUser = data.user;
    localStorage.setItem('session', JSON.stringify({ session: data, email }));
    
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('topbar-addr').textContent = email;
    await loadEmails();
  } catch(err) {
    document.getElementById('login-err').textContent = err.message;
  } finally {
    document.getElementById('login-btn').disabled = false;
  }
}

async function doRegister() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const email = `${username}@lies.lat`;
  
  if (!username || username.length < 2) {
    document.getElementById('login-err').textContent = 'Username must be at least 2 characters';
    return;
  }
  if (!password || password.length < 6) {
    document.getElementById('login-err').textContent = 'Password must be at least 6 characters';
    return;
  }
  
  document.getElementById('login-err').textContent = '';
  document.getElementById('register-btn').disabled = true;
  
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        email, 
        password,
        data: { username }
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error_description || 'Registration failed');
    
    if (data.access_token) {
      currentSession = data;
      currentUser = data.user;
      localStorage.setItem('session', JSON.stringify({ session: data, email }));
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('topbar-addr').textContent = email;
      await loadEmails();
    } else {
      document.getElementById('login-err').textContent = 'Account created! You can now log in.';
      document.getElementById('login-password').value = '';
    }
  } catch(err) {
    document.getElementById('login-err').textContent = err.message;
  } finally {
    document.getElementById('register-btn').disabled = false;
  }
}

async function loadEmails() {
  if (!currentUser) return;
  
  try {
    // Simple query to get all emails for this user
    const query = `/rest/v1/emails?select=*&user_id=eq.${currentUser.id}&order=received_at.desc`;
    const data = await sbFetch(query);
    emails = Array.isArray(data) ? data : [];
    
    console.log('Loaded emails:', emails.length);
    console.log('First email:', emails[0]);
    
    renderEmailList();
  } catch(err) {
    console.error('Load error:', err);
    document.getElementById('email-list').innerHTML = `<div style="padding:20px; text-align:center; opacity:0.5;">Error loading: ${err.message}</div>`;
  }
}

function renderEmailList() {
  const container = document.getElementById('email-list');
  const filtered = emails.filter(e => {
    const search = document.getElementById('search-input')?.value.toLowerCase() || '';
    if (!search) return true;
    return (e.subject || '').toLowerCase().includes(search) || 
           (e.from_address || '').toLowerCase().includes(search);
  });
  
  if (filtered.length === 0) {
    container.innerHTML = '<div style="padding:40px; text-align:center; opacity:0.3;">no messages</div>';
    return;
  }
  
  container.innerHTML = filtered.map(email => `
    <div class="email-item" onclick="viewEmail('${email.id}')">
      <div class="email-from">${escapeHtml(email.from_address || email.from_name || 'unknown')}</div>
      <div class="email-subject">${escapeHtml(email.subject || '(no subject)')}</div>
      <div style="font-size:9px; color:rgba(255,255,255,0.2); margin-top:4px;">${formatDate(email.received_at)}</div>
    </div>
  `).join('');
}

function viewEmail(id) {
  const email = emails.find(e => e.id === id);
  if (!email) return;
  
  const detailPane = document.getElementById('detail-pane');
  detailPane.innerHTML = `
    <div style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:12px; margin-bottom:16px;">
      <div style="font-size:14px; margin-bottom:8px;">${escapeHtml(email.subject || '(no subject)')}</div>
      <div style="font-size:10px; color:rgba(255,255,255,0.4);">from: ${escapeHtml(email.from_address || email.from_name)}</div>
      <div style="font-size:10px; color:rgba(255,255,255,0.4);">to: ${escapeHtml(email.to_address)}</div>
      <div style="font-size:10px; color:rgba(255,255,255,0.2); margin-top:4px;">${formatDateTime(email.received_at)}</div>
    </div>
    <div style="font-size:13px; line-height:1.6; color:rgba(255,255,255,0.6); white-space:pre-wrap;">
      ${escapeHtml(email.body_text || email.body_html || '(no content)')}
    </div>
  `;
  
  // Mark as read
  if (!email.is_read) {
    email.is_read = true;
    sbFetch(`/rest/v1/emails?id=eq.${email.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ is_read: true })
    }).catch(console.error);
  }
}

function setFolder(folder) {
  currentFolder = folder;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  loadEmails();
}

function doLogout() {
  currentSession = null;
  currentUser = null;
  localStorage.removeItem('session');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-password').value = '';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatDateTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString();
}

async function restoreSession() {
  const saved = localStorage.getItem('session');
  if (!saved) return;
  
  try {
    const { session, email } = JSON.parse(saved);
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${session.access_token}` }
    });
    if (res.ok) {
      const user = await res.json();
      currentSession = session;
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('topbar-addr').textContent = email;
      await loadEmails();
    } else {
      localStorage.removeItem('session');
    }
  } catch(e) {
    localStorage.removeItem('session');
  }
}

document.getElementById('login-btn').onclick = doLogin;
document.getElementById('register-btn').onclick = doRegister;
document.getElementById('login-password').onkeypress = (e) => { if (e.key === 'Enter') doLogin(); };
document.getElementById('search-input').oninput = () => renderEmailList();

restoreSession();
</script>
</body>
</html>
