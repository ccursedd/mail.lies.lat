<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mail.lies.lat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #000;
  color: #fff;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  -webkit-font-smoothing: antialiased;
  font-size: 12px;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }
a { color: rgba(255,255,255,0.4); text-decoration: none; }
a:hover { color: rgba(255,255,255,0.8); }

.auth-screen {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 300px;
}
.auth-title {
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: 0.2;
  margin-bottom: 8px;
}
.username-wrap {
  display: flex;
  align-items: baseline;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  transition: border-color 0.25s;
  width: 100%;
  position: relative;
}
.username-wrap:focus-within { border-color: rgba(255,255,255,0.3); }
.username-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: right;
  letter-spacing: 2px;
  min-width: 0;
}
.username-wrap input::placeholder { color: rgba(255,255,255,0.12); }
.username-suffix {
  font-size: 13px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.22);
  white-space: nowrap;
  padding: 8px 0 8px 1px;
  flex-shrink: 0;
}
.uline {
  position: absolute;
  bottom: -1px; left: 50%;
  width: 0; height: 1px;
  background: rgba(255,255,255,0.5);
  transition: width 0.3s, left 0.3s;
}
.username-wrap:focus-within .uline { width: 100%; left: 0; }
.auth-field { width: 100%; position: relative; }
.auth-field input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 0;
  outline: none;
  text-align: center;
  letter-spacing: 2px;
  transition: border-color 0.25s;
}
.auth-field input:focus { border-color: rgba(255,255,255,0.3); }
.auth-field input::placeholder { color: rgba(255,255,255,0.12); }
.fline {
  position: absolute;
  bottom: 0; left: 50%;
  width: 0; height: 1px;
  background: rgba(255,255,255,0.5);
  transition: width 0.3s, left 0.3s;
}
.auth-field input:focus ~ .fline { width: 100%; left: 0; }
.auth-hint { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.15); text-align: center; margin-top: -8px; }
.auth-links { font-size: 10px; letter-spacing: 2px; opacity: 0.2; }
.auth-links a { color: #fff; }
.auth-links a:hover { opacity: 0.8; }
.err { font-size: 10px; color: rgba(255,80,80,0.7); letter-spacing: 1px; min-height: 14px; text-align: center; }
.ok  { font-size: 10px; color: rgba(80,255,120,0.7); letter-spacing: 1px; min-height: 14px; text-align: center; }

.btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.4);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 10px 28px;
  cursor: pointer;
  transition: all 0.25s;
  border-radius: 2px;
}
.btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-sm { padding: 6px 14px; font-size: 9px; letter-spacing: 2px; }
.btn-danger { border-color: rgba(255,80,80,0.15); color: rgba(255,80,80,0.4); }
.btn-danger:hover { border-color: rgba(255,80,80,0.4); color: rgba(255,80,80,0.8); }
.btn-primary { border-color: rgba(88,101,242,0.3); color: rgba(88,101,242,0.7); }
.btn-primary:hover { border-color: rgba(88,101,242,0.5); color: rgba(88,101,242,1); }
.btn-icon {
  background: transparent; border: none;
  color: rgba(255,255,255,0.3); cursor: pointer;
  font-family: inherit; font-size: 11px;
  padding: 4px 8px; border-radius: 2px; transition: color 0.2s;
}
.btn-icon:hover { color: rgba(255,255,255,0.8); }

#app { display: none; height: 100vh; flex-direction: column; }
.topbar {

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.live-dot {

.main { display: flex; flex: 1; overflow: hidden; }

.sidebar {

}
.compose-btn {

  background: transparent; border: 1px solid rgba(255,255,255,0.08);

}
.compose-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
.nav-item {

.sidebar-section {

.email-list-pane {

}
.pane-header {

.pane-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.4; }

.search-bar { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }

.email-list { overflow-y: auto; flex: 1; }
.email-item {

.detail-meta { font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.25); }

.detail-actions { margin-left: auto; display: flex; gap: 6px; }
.detail-body { flex: 1; overflow-y: auto; padding: 24px; }
.detail-body-text { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
.detail-body-html { color: rgba(255,255,255,0.55); font-size: 13px; line-height: 1.8; }

.reply-area { border-top: 1px solid rgba(255,255,255,0.05); padding: 16px 24px; flex-shrink: 0; }

.modal-overlay {

}

.modal-field input {

}
.modal-field input::placeholder { color: rgba(255,255,255,0.1); }
.modal-from { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }
.modal-body { padding: 16px 20px; }
.modal-body textarea {
  width: 100%; background: transparent; border: none;

}

.modal-footer {
  padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.05);

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #111; border: 1px solid rgba(255,255,255,0.08);
  padding: 12px 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  opacity: 0; transition: opacity 0.3s; z-index: 200; border-radius: 2px; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.err { border-color: rgba(255,80,80,0.2); color: rgba(255,80,80,0.7); }
.toast.ok  { border-color: rgba(80,200,100,0.2); color: rgba(80,200,100,0.7); }

.loader {

  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.fade-in { animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.empty-state {
  display: flex; flex-direction: column; align-items: center;

}
.empty-state p { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

<body>

<!-- LOGIN -->
<div id="login-screen" class="auth-screen fade-in">
  <div class="auth-box">
    <div class="auth-title">mail.lies.lat</div>

      <input type="text" id="login-username" placeholder="username"
             autocomplete="username" autofocus

      <div class="uline"></div>

</div>

<!-- REGISTER -->

    </div>

<!-- APP -->
<div id="app" style="display:none; flex-direction:column; height:100vh;">
  <div class="topbar">
    <div class="topbar-logo">mail.lies.lat</div>
    <span class="live-dot"></span>
    <div id="topbar-addr" class="topbar-addr"></div>

  </div>
  <div class="main">
    <div class="sidebar">

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DOMAIN       = 'lies.lat';
const SUPABASE_URL = 'https://kpuegnejvlgypfvjhdwo.supabase.co';
const SUPABASE_KEY = 'sb_publishable__XS7GvAwectb2eVNhOtnVA_5DUs0B9L';
const MAILGUN_KEY  = '445d9949d4e2b6d36db7eea3c3a73421';

let currentUser    = null;
let currentSession = null;
let emails         = [];
let currentEmail   = null;
let currentFolder  = 'inbox';
let refreshTimer   = null;
let myEmail        = '';

// strip anything that isn't a valid username char, force lowercase
function cleanUsername(el) {
  const v = el.value.replace(/[^a-zA-Z0-9.\-_]/g, '').toLowerCase();
  if (el.value !== v) el.value = v;
}

function buildEmail(username) {
  return username.trim().toLowerCase() + '@' + DOMAIN;
}

function isValidUsername(u) {
  return /^[a-z0-9.\-_]{2,40}$/.test(u);
}

function showScreen(name) {
  document.getElementById('login-screen').style.display    = name === 'login'    ? 'flex' : 'none';
  document.getElementById('register-screen').style.display = name === 'register' ? 'flex' : 'none';
  document.getElementById('app').style.display             = name === 'app'      ? 'flex' : 'none';
  if (name === 'login')    { document.getElementById('login-username').focus(); }
  if (name === 'register') { document.getElementById('reg-username').focus(); }
}

// ── SUPABASE ──
async function sb(path, opts = {}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...(opts.headers || {})
  };
  if (currentSession && currentSession.access_token) {
    headers['Authorization'] = 'Bearer ' + currentSession.access_token;
  }
  const r = await fetch(SUPABASE_URL + path, Object.assign({}, opts, { headers }));
  const text = await r.text();
  if (!r.ok) throw new Error(text || r.statusText);
  try { return JSON.parse(text); } catch(e) { return {}; }
}

async function sbAuth(path, body) {
  const r = await fetch(SUPABASE_URL + '/auth/v1' + path, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + SUPABASE_KEY
    },
    body: JSON.stringify(body)
  });
  const text = await r.text();
  try { return JSON.parse(text); } catch(e) { return {}; }
}

// ── LOGIN ──
async function doLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const pass     = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-err');
  errEl.textContent = '';

  if (!username)              { errEl.textContent = 'enter your username'; return; }
  if (!isValidUsername(username)) { errEl.textContent = 'invalid username'; return; }
  if (!pass)                  { errEl.textContent = 'enter your password'; return; }

  const email = buildEmail(username);
  const btn   = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '...';

  try {
    const data = await sbAuth('/token?grant_type=password', { email: email, password: pass });
    if (data.error || data.error_description) {
      errEl.textContent = 'wrong username or password';
      document.getElementById('login-password').value = '';
      return;
    }
    currentSession = data;
    currentUser    = data.user;
    myEmail        = email;
    bootApp();
  } catch(e) {
    errEl.textContent = 'connection failed';
  } finally {
    btn.disabled = false; btn.textContent = 'enter';
  }
}

// ── REGISTER ──
async function doRegister() {
  const username = document.getElementById('reg-username').value.trim().toLowerCase();
  const pass     = document.getElementById('reg-password').value;
  const pass2    = document.getElementById('reg-password2').value;
  const errEl    = document.getElementById('reg-err');
  const okEl     = document.getElementById('reg-ok');
  errEl.textContent = ''; okEl.textContent = '';

  if (!username)                  { errEl.textContent = 'choose a username'; return; }
  if (!isValidUsername(username)) { errEl.textContent = 'letters, numbers, dots and dashes only (min 2 chars)'; return; }
  if (!pass)                      { errEl.textContent = 'enter a password'; return; }
  if (pass.length < 6)            { errEl.textContent = 'password must be at least 6 characters'; return; }
  if (pass !== pass2)             { errEl.textContent = 'passwords do not match'; return; }

  const email = buildEmail(username);
  const btn   = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = '...';

  try {
    const data = await sbAuth('/signup', {
      email:    email,
      password: pass,
      data:     { username: username, display_name: username, mail_address: email }
    });

    if (data.error || data.error_description) {
      const msg = (data.error_description || data.error || '').toLowerCase();
      if (msg.includes('already') || msg.includes('exists')) {
        errEl.textContent = 'username already taken';
      } else {
        errEl.textContent = data.error_description || data.error || 'registration failed';
      }
      return;
    }

    // If email confirmation is disabled, Supabase returns session immediately
    if (data.access_token) {
      currentSession = data;
      currentUser    = data.user;
      myEmail        = email;
      bootApp();
      return;
    }

    okEl.textContent = 'account created! your address: ' + email;
    setTimeout(function() { showScreen('login'); }, 4000);
  } catch(e) {
    errEl.textContent = 'connection failed';
  } finally {
    btn.disabled = false; btn.textContent = 'register';
  }
}

// ── LOGOUT ──
function doLogout() {
  currentSession = null; currentUser = null; myEmail = '';
  emails = []; currentEmail = null; currentFolder = 'inbox';
  clearInterval(refreshTimer);
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-err').textContent = '';
  showScreen('login');
}

// ── BOOT ──
function bootApp() {
  const username = (currentUser && currentUser.user_metadata && currentUser.user_metadata.username)
    || myEmail.split('@')[0];
  myEmail = buildEmail(username);
  document.getElementById('topbar-addr').textContent      = myEmail;
  document.getElementById('compose-from-label').textContent = myEmail;
  showScreen('app');
  document.getElementById('email-list').innerHTML =
    '<div class="empty-state"><div class="loader"></div></div>';
  setFolder('inbox');
  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadEmails, 15000);
}

// ── EMAILS ──
async function loadEmails() {
  try {
    var q = '/rest/v1/emails?select=*&order=received_at.desc.nullslast,created_at.desc';
    if (currentFolder === 'inbox')   q += '&folder=eq.inbox&is_deleted=eq.false';
    if (currentFolder === 'sent')    q += '&folder=eq.sent&is_deleted=eq.false';
    if (currentFolder === 'trash')   q += '&is_deleted=eq.true';
    if (currentFolder === 'unread')  q += '&is_read=eq.false&is_deleted=eq.false';
    if (currentFolder === 'starred') q += '&is_starred=eq.true&is_deleted=eq.false';
    const data = await sb(q, { headers: { 'Prefer': 'return=representation' } });
    emails = Array.isArray(data) ? data : [];
    renderEmailList(emails);
    updateUnreadCount();
  } catch(e) {
    emails = [];
    renderEmailList([]);
  }
}

function renderEmailList(list) {
  var el = document.getElementById('email-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state"><p>no mail</p></div>'; return; }
  el.innerHTML = list.map(function(e) {
    var from    = e.from_name || e.from_address || 'unknown';
    var subject = e.subject || '(no subject)';
    var preview = stripHtml(e.body_text || e.body_html || '');
    var date    = formatDate(e.received_at || e.created_at);
    var unread  = !e.is_read;
    var active  = currentEmail && currentEmail.id === e.id;
    return '<div class="email-item ' + (unread ? 'unread' : '') + ' ' + (active ? 'active' : '') + '"'
      + ' onclick="openEmail(\'' + e.id + '\')" data-id="' + e.id + '">'
      + '<div class="email-meta">'
      + '<div class="email-from">' + esc(truncate(from, 28)) + '</div>'
      + '<div class="email-time">' + date + '</div>'
      + '</div>'
      + '<div class="email-subject">' + esc(truncate(subject, 36)) + '</div>'
      + '<div class="email-preview">' + esc(truncate(preview, 55)) + '</div>'
      + '</div>';
  }).join('');
}

function filterEmails(q) {
  q = q.toLowerCase();
  renderEmailList(emails.filter(function(e) {
    return (e.from_address||'').toLowerCase().includes(q)
      || (e.from_name||'').toLowerCase().includes(q)
      || (e.subject||'').toLowerCase().includes(q)
      || (e.body_text||'').toLowerCase().includes(q);
  }));
}

async function openEmail(id) {
  var email = emails.find(function(e) { return e.id === id; });
  if (!email) return;
  currentEmail = email;
  document.querySelectorAll('.email-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.querySelector('[data-id="' + id + '"]');
  if (item) item.classList.add('active');
  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-view').style.display  = 'flex';
  document.getElementById('detail-subject').textContent = email.subject || '(no subject)';
  document.getElementById('detail-from').textContent    = email.from_address || email.from_name || 'unknown';
  document.getElementById('detail-to').textContent      = email.to_address || myEmail;
  document.getElementById('detail-date').textContent    = formatDateTime(email.received_at || email.created_at);
  var btnStar = document.getElementById('btn-star');
  btnStar.innerHTML = email.is_starred ? '&#9733;' : '&#9734;';
  btnStar.style.color = email.is_starred ? 'rgba(255,200,50,0.8)' : '';
  var body = document.getElementById('detail-body');
  if (email.body_html) {
    body.innerHTML = '<div class="detail-body-html">' + sanitizeHtml(email.body_html) + '</div>';
  } else {
    body.innerHTML = '<div class="detail-body-text">' + esc(email.body_text || '(empty)') + '</div>';
  }
  document.getElementById('reply-text').value = '';
  document.getElementById('reply-text').placeholder = 'reply to ' + (email.from_address || '') + '...';
  if (!email.is_read) {
    email.is_read = true;
    if (item) item.classList.remove('unread');
    updateUnreadCount();
    try {
      await sb('/rest/v1/emails?id=eq.' + id, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify({ is_read: true })
      });
    } catch(e) {}
  }
}

function closeDetail() {
  currentEmail = null;
  document.getElementById('detail-view').style.display  = 'none';
  document.getElementById('detail-empty').style.display = 'flex';
  document.querySelectorAll('.email-item').forEach(function(el) { el.classList.remove('active'); });
}

async function toggleStar() {
  if (!currentEmail) return;
  currentEmail.is_starred = !currentEmail.is_starred;
  var btn = document.getElementById('btn-star');
  btn.innerHTML = currentEmail.is_starred ? '&#9733;' : '&#9734;';
  btn.style.color = currentEmail.is_starred ? 'rgba(255,200,50,0.8)' : '';
  try {
    await sb('/rest/v1/emails?id=eq.' + currentEmail.id, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_starred: currentEmail.is_starred })
    });
  } catch(e) {}
}

async function moveToTrash() {
  if (!currentEmail) return;
  try {
    await sb('/rest/v1/emails?id=eq.' + currentEmail.id, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_deleted: true })
    });
    toast('moved to trash');
    closeDetail();
    loadEmails();
  } catch(e) { toast('error', true); }
}

async function markAllRead() {
  try {
    await sb('/rest/v1/emails?is_read=eq.false&is_deleted=eq.false', {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_read: true })
    });
    emails.forEach(function(e) { e.is_read = true; });
    renderEmailList(emails);
    updateUnreadCount();
  } catch(e) {}
}

function setFolder(folder) {
  currentFolder = folder;
  closeDetail();
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var nav = document.getElementById('nav-' + folder);
  if (nav) nav.classList.add('active');
  document.getElementById('pane-title').textContent = folder;
  document.getElementById('search-input').value = '';
  document.getElementById('email-list').innerHTML =
    '<div class="empty-state"><div class="loader"></div></div>';
  loadEmails();
}

function updateUnreadCount() {
  var n = emails.filter(function(e) { return !e.is_read && !e.is_deleted; }).length;
  document.getElementById('unread-count').textContent = n > 0 ? n : '';
}

function refreshEmails() {
  document.getElementById('email-list').innerHTML =
    '<div class="empty-state"><div class="loader"></div></div>';
  loadEmails();
}

function openCompose() {
  document.getElementById('compose-modal').style.display = 'flex';
  document.getElementById('compose-to').value      = '';
  document.getElementById('compose-subject').value = '';
  document.getElementById('compose-body').value    = '';
  document.getElementById('compose-status').textContent = '';
  document.getElementById('compose-to').focus();
}
function closeCompose() {
  document.getElementById('compose-modal').style.display = 'none';
}

async function sendCompose() {
  var to      = document.getElementById('compose-to').value.trim();
  var subject = document.getElementById('compose-subject').value.trim();
  var body    = document.getElementById('compose-body').value.trim();
  var status  = document.getElementById('compose-status');
  if (!to)   { status.textContent = 'enter a recipient'; return; }
  if (!body) { status.textContent = 'message body empty'; return; }
  status.textContent = 'sending...';
  try {
    var fd = new FormData();
    fd.append('from', myEmail);
    fd.append('to', to);
    fd.append('subject', subject || '(no subject)');
    fd.append('text', body);
    await fetch('https://api.mailgun.net/v3/' + DOMAIN + '/messages', {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + btoa('api:' + MAILGUN_KEY) },
      body: fd
    });
    await sb('/rest/v1/emails', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: currentUser ? currentUser.id : null,
        from_address: myEmail,
        from_name: currentUser && currentUser.user_metadata ? currentUser.user_metadata.username : '',
        to_address: to,
        subject: subject || '(no subject)',
        body_text: body,
        folder: 'sent', is_read: true, is_deleted: false, is_starred: false,
        received_at: new Date().toISOString()
      })
    });
    status.textContent = 'sent!';
    toast('message sent');
    setTimeout(closeCompose, 1200);
    if (currentFolder === 'sent') loadEmails();
  } catch(e) {
    status.textContent = 'failed';
    toast('send failed', true);
  }
}

async function sendReply() {
  if (!currentEmail) return;
  var body = document.getElementById('reply-text').value.trim();
  if (!body) return;
  var to = currentEmail.from_address || '';
  try {
    var fd = new FormData();
    fd.append('from', myEmail);
    fd.append('to', to);
    fd.append('subject', 'Re: ' + (currentEmail.subject || ''));
    fd.append('text', body);
    await fetch('https://api.mailgun.net/v3/' + DOMAIN + '/messages', {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + btoa('api:' + MAILGUN_KEY) },
      body: fd
    });
    await sb('/rest/v1/emails', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: currentUser ? currentUser.id : null,
        from_address: myEmail,
        to_address: to,
        subject: 'Re: ' + (currentEmail.subject || ''),
        body_text: body,
        folder: 'sent', is_read: true, is_deleted: false, is_starred: false,
        received_at: new Date().toISOString()
      })
    });
    document.getElementById('reply-text').value = '';
    toast('reply sent');
  } catch(e) { toast('reply failed', true); }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function truncate(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n) + '\u2026' : s;
}
function stripHtml(html) {
  var d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}
function sanitizeHtml(html) {
  return html.replace(/<script[\s\S]*?<\/script>/gi,'')
             .replace(/on\w+="[^"]*"/gi,'')
             .replace(/javascript:/gi,'');
}
function formatDate(ts) {
  if (!ts) return '';
  var d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  if ((now - d) < 7 * 86400000)
    return d.toLocaleDateString([], {weekday:'short'});
  return d.toLocaleDateString([], {month:'short', day:'numeric'});
}
function formatDateTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString([], {month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'});
}
function toast(msg, isErr) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (isErr ? 'err' : 'ok');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('compose-modal').style.display !== 'none') closeCompose();
    else closeDetail();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    if (document.getElementById('app').style.display !== 'none') openCompose();
  }
});

document.getElementById('login-username').addEventListener('keydown', function(e) { if (e.key==='Enter') doLogin(); });
document.getElementById('login-password').addEventListener('keydown', function(e) { if (e.key==='Enter') doLogin(); });
document.getElementById('reg-username').addEventListener('keydown',   function(e) { if (e.key==='Enter') doRegister(); });
document.getElementById('reg-password').addEventListener('keydown',   function(e) { if (e.key==='Enter') doRegister(); });
document.getElementById('reg-password2').addEventListener('keydown',  function(e) { if (e.key==='Enter') doRegister(); });
</script>
